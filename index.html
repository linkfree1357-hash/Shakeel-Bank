<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Portal</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;

  background: linear-gradient(135deg,#ffffff,#dbeafe,#93c5fd);
}

/* MAIN CONTAINER */
.container{
  width:100%;
  max-width:800px;

  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(18px);

  border-radius:30px;
  padding:25px;

  border:1px solid #bfdbfe;
  box-shadow:0 10px 35px rgba(0,0,0,0.1);
}

/* LOGO */
.logo{
  text-align:center;
  margin-bottom:20px;
}

.logo img{
  width:100%;
  max-width:340px;
  aspect-ratio:3.2/1;
  object-fit:contain;

  background:white;
  padding:10px;
  border-radius:18px;
  border:1px solid #cbd5e1;
}

.title{
  font-size:28px;
  font-weight:bold;
  color:#1e3a8a;
}

.subtitle{
  font-size:14px;
  color:#475569;
}

/* BANK CARD */
.bank{
  margin-top:20px;
  padding:20px;

  background:white;
  border-radius:25px;

  border:1px solid #e0e7ff;

  box-shadow:0 5px 15px rgba(59,130,246,0.1);
}

.bank h2{
  color:#2563eb;
  margin-bottom:15px;
}

/* ROW */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:12px;
  margin-bottom:10px;

  background:#f8fafc;
  border-radius:15px;
  border:1px solid #e2e8f0;
}

.label{
  color:#64748b;
  font-weight:bold;
}

/* COPY BUTTON */
.copy-btn{
  padding:8px 12px;
  border:none;
  border-radius:10px;

  background:#3b82f6;
  color:white;

  cursor:pointer;
  font-weight:bold;
}

.copy-btn:hover{
  background:#1d4ed8;
}

/* SEND BUTTON */
.send-btn{
  width:100%;
  margin-top:20px;
  padding:15px;

  border:none;
  border-radius:15px;

  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;

  font-size:16px;
  font-weight:bold;

  cursor:pointer;
  transition:0.3s;
}

.send-btn:hover{
  transform:scale(1.02);
}

/* TOAST */
.toast{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%) translateY(100px);

  background:#111827;
  color:white;

  padding:12px 18px;
  border-radius:12px;

  opacity:0;
  transition:0.4s;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <img src="logo.png">
    <div class="title">Payment Portal</div>
    <div class="subtitle">Send Payment Proof via WhatsApp</div>
  </div>

  <!-- COMMERCIAL BANK -->
  <div class="bank">
    <h2>COMMERCIAL BANK</h2>

    <div class="row">
      <div><span class="label">Name:</span> MHA. Shakeel</div>
      <button class="copy-btn" onclick="copy('MHA. Shakeel')">Copy</button>
    </div>

    <div class="row">
      <div><span class="label">A/C:</span> 1000965986</div>
      <button class="copy-btn" onclick="copy('1000965986')">Copy</button>
    </div>

    <div class="row">
      <div><span class="label">Branch:</span> Kattankudy</div>
      <button class="copy-btn" onclick="copy('Kattankudy')">Copy</button>
    </div>
  </div>

  <!-- AMANA BANK -->
  <div class="bank">
    <h2>AMANA BANK</h2>

    <div class="row">
      <div><span class="label">Name:</span> MHA. Shakeel</div>
      <button class="copy-btn" onclick="copy('MHA. Shakeel')">Copy</button>
    </div>

    <div class="row">
      <div><span class="label">A/C:</span> 001-0274441-002</div>
      <button class="copy-btn" onclick="copy('001-0274441-002')">Copy</button>
    </div>

    <div class="row">
      <div><span class="label">Branch:</span> Kattankudy</div>
      <button class="copy-btn" onclick="copy('Kattankudy')">Copy</button>
    </div>
  </div>

  <!-- BOC -->
  <div class="bank">
    <h2>BOC</h2>

    <div class="row">
      <div><span class="label">Name:</span> MHA. Shakeel</div>
      <button class="copy-btn" onclick="copy('MHA. Shakeel')">Copy</button>
    </div>

    <div class="row">
      <div><span class="label">A/C:</span> 88432526</div>
      <button class="copy-btn" onclick="copy('88432526')">Copy</button>
    </div>

    <div class="row">
      <div><span class="label">Branch:</span> Kattankudy</div>
      <button class="copy-btn" onclick="copy('Kattankudy')">Copy</button>
    </div>
  </div>

  <!-- SEND PROOF -->
  <button class="send-btn" onclick="sendWhatsApp()">
    📤 Send Payment Proof via WhatsApp
  </button>

</div>

<!-- TOAST -->
<div class="toast" id="toast">Copied ✓</div>

<script>

function copy(text){
  navigator.clipboard.writeText(text);

  let toast=document.getElementById("toast");
  toast.innerText="Copied ✓";
  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  },1500);
}

/* WHATSAPP SEND */
function sendWhatsApp(){

  let message = 
`Hello Shakeel Store 👋

I have made a payment.

Please find my payment receipt attached.

Thank you.`;

  let phone = "+94 77 057 8483"; // 👉 change this

  let url = "https://wa.me/"+phone+"?text="+encodeURIComponent(message);

  window.open(url,"_blank");
}

</script>

</body>
</html></html>
